<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- cinzel and montserrat font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <!-- swiper css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
</head>

<body>

    <div class="h-screen"></div>

    <div class="carousel-wrapper py-section relative" style="background: url(/assets/am/amenities_texture.jpg) center;">
        <div class="custom_container space-y-6 text-center">
            <span class="block title">world-class</span>
            <h4 class="cinzel-uniquifier heading">Amenities</h4>
        </div>

        <!-- Swiper -->
        <div class="swiper amenitiesSwiper pt-14">
            <div class="swiper-wrapper items-center lg:h-[520px] h-[350px] hover:cursor-grab">

                <!-- Slide 1 -->
                <div class="swiper-slide overflow-hidden rounded-lg" data-caption="Trump® Tower, Jeddah">
                    <img src="/assets/am/meeting_room.webp"
                        class="object-cover w-full h-full rounded-[6px]  transition-all duration-700 ease-out"
                        alt="Trump® Tower, Jeddah" />
                </div>
                <div class="swiper-slide overflow-hidden rounded-lg"
                    data-caption="Albemarle Estate at Trump® Winery, Charlottesville">
                    <img src="/assets/am/billiard_room.webp"
                        class="object-cover w-full h-full rounded-[6px]  transition-all duration-700 ease-out"
                        alt="Albemarle Estate at Trump® Winery, Charlottesville" />
                </div>
                <div class="swiper-slide overflow-hidden rounded-lg" data-caption="Trump® National Doral, Miami">
                    <img src="/assets/am/trump_doral.webp"
                        class="object-cover w-full h-full rounded-[6px]  transition-all duration-700 ease-out"
                        alt="Trump® National Doral, Miami" />
                </div>
                <div class="swiper-slide overflow-hidden rounded-lg" data-caption="Trump® Tower, Kolkata">
                    <img src="/assets/am/trump_tower_kolkata.webp"
                        class="object-cover w-full h-full rounded-[6px]  transition-all duration-700 ease-out"
                        alt="Trump® Tower, Kolkata" />
                </div>
                <div class="swiper-slide overflow-hidden rounded-lg"
                    data-caption="40 Wall Street - The Trump® Building, New York">
                    <img src="/assets/am/40_wall_street.webp"
                        class="object-cover w-full h-full rounded-[6px]  transition-all duration-700 ease-out"
                        alt="40 Wall Street - The Trump® Building, New York" />
                </div>
                <div class="swiper-slide overflow-hidden rounded-lg"
                    data-caption="Trump® International Hotel, Las Vegas">
                    <img src="/assets/am/trump_international_hotel.webp"
                        class="object-cover w-full h-full rounded-[6px]  transition-all duration-700 ease-out"
                        alt="Trump® International Hotel, Las Vegas" />
                </div>
                <div class="swiper-slide overflow-hidden rounded-lg"
                    data-caption="Trump® International Hotel and Tower, New York">
                    <img src="/assets/am/trump_international_hotel_tower.webp"
                        class="object-cover w-full h-full rounded-[6px]  transition-all duration-700 ease-out"
                        alt="Trump® International Hotel and Tower, New York" />
                </div>
                <div class="swiper-slide overflow-hidden rounded-lg"
                    data-caption="Trump® International Hotel and Tower , Chicago">
                    <img src="/assets/am/trump_international_hotel_tower_chicago.webp"
                        class="object-cover w-full h-full rounded-[6px]  transition-all duration-700 ease-out"
                        alt="Trump® International Hotel and Tower , Chicago" />
                </div>


            </div>
        </div>

        <!-- Caption -->
        <div class="caption-area flex items-center justify-center gap-4 mt-9 lg:px-0 px-5">
            <div class="caption-arrow amenitiesPrevSlide">
                <svg class="w-[32px] h-[10px] shrink-0" viewBox="0 0 40 10" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <line x1="40" y1="5" x2="10" y2="5" stroke="#D6D6D6" stroke-width="0.8" />
                    <polyline points="14,1 6,5 14,9" fill="none" stroke="#D6D6D6" stroke-width="0.8" />
                </svg>
            </div>

            <p class="amenities-caption-text" id="slideCaption">Trump® National Doral, Miami</p>

            <div class="caption-arrow amenitiesNextSlide">
                <svg class="w-[32px] h-[10px] shrink-0" viewBox="0 0 40 10" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <line x1="0" y1="5" x2="30" y2="5" stroke="#D6D6D6" stroke-width="0.8" />
                    <polyline points="26,1 34,5 26,9" fill="none" stroke="#D6D6D6" stroke-width="0.8" />
                </svg>
            </div>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/bundled/lenis.min.js"></script>

    <script>
        const lenis = new Lenis({
            duration: 1.2,
            lerp: 0.08,
            smoothWheel: true,
        })

        function raf(time) {
            lenis.raf(time)
            requestAnimationFrame(raf)
        }

        requestAnimationFrame(raf)
    </script>

    <!-- custom js -->
    <script src="/js/script.js"></script>
</body>

</html>
